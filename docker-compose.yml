# ────────────────────────────────────────────────
# AutoApply AI — Docker Compose
# Services: api, frontend, db (optional PostgreSQL)
# ────────────────────────────────────────────────

version: "3.9"

services:
  # ── FastAPI backend + workers ──
  api:
    build: .
    container_name: autoapply-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    depends_on:
      - db
    restart: unless-stopped

  # ── Next.js frontend ──
  frontend:
    build: ./frontend
    container_name: autoapply-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  # ── PostgreSQL (optional, comment out to use SQLite) ──
  db:
    image: postgres:16-alpine
    container_name: autoapply-db
    environment:
      POSTGRES_DB: autoapply
      POSTGRES_USER: autoapply
      POSTGRES_PASSWORD: autoapply_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
